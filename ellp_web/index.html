<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELLP - Acesso ao Sistema</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div id="login-section" class="form-section active">
            <h2>Login no ELLP</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="E-mail" required>
                <input type="password" id="login-senha" placeholder="Senha" required>
                <button type="submit" class="btn-primary">Entrar</button>
                <button type="button" id="btn-google-login" class="btn-google">Entrar com Google (OAuth)</button>
            </form>
            <p>Não possui conta? <a href="#" id="show-register">Registre-se aqui</a></p>
        </div>

        <div id="register-section" class="form-section hidden">
            <h2>Registro de Usuário</h2>
            <form id="register-form">
                <input type="text" id="reg-nome" placeholder="Nome Completo" required>
                <input type="text" id="reg-ra" placeholder="Registro Acadêmico (RA)" required>
                <input type="email" id="reg-email" placeholder="E-mail" required>
                <input type="password" id="reg-senha" placeholder="Senha" required>
                <button type="submit" class="btn-primary">Criar Conta</button>
                <button type="button" id="btn-google-reg" class="btn-google">Cadastrar com Google</button>
            </form>
            <p>Já possui conta? <a href="#" id="show-login">Faça Login</a></p>
        </div>
    </div>

    <script src="js/models/usuarios.js" defer></script>
    <script src="js/controller/AuthController.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
